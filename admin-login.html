<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — DropResearch Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1E3A5F;--navy-dark:#142840;--gold:#F59E0B;--gold-light:#FCD34D;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;--g400:#9CA3AF;
  --g500:#6B7280;--g700:#374151;--g900:#111827;--red:#DC2626;--red-bg:#FEE2E2;
}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a1628 0%,#142840 60%,#1a3558 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:44px;max-width:420px;width:100%;box-shadow:0 32px 80px rgba(0,0,0,.32)}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:26px;text-decoration:none}
.logo-icon{width:42px;height:42px;background:var(--navy-dark);border-radius:11px;display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:8px 7px}
.logo-bar{width:5px;border-radius:2px;background:#fff}
.logo-bar.g{background:var(--gold)}
.logo-text{font-size:21px;font-weight:900;color:var(--navy-dark);letter-spacing:-.6px}
.logo-text span{color:var(--gold)}
.admin-badge{display:block;width:max-content;margin:0 auto 18px;background:var(--g50);border:1px solid var(--g200);color:var(--navy);padding:8px 12px;border-radius:999px;font-size:12px;font-weight:900}
h1{text-align:center;color:var(--navy-dark);font-size:30px;font-weight:900;letter-spacing:-1px;margin-bottom:8px}
.sub{text-align:center;color:var(--g500);font-size:14px;line-height:1.6;margin-bottom:26px}
label{display:block;color:var(--g700);font-size:13px;font-weight:800;margin-bottom:8px}
input{width:100%;border:1.5px solid var(--g200);border-radius:14px;padding:15px 16px;font-size:15px;font-family:inherit;margin-bottom:14px;outline:none;transition:.15s}
input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(245,158,11,.14)}
.error{display:none;background:var(--red-bg);color:var(--red);border-radius:12px;padding:12px 14px;font-size:13px;font-weight:800;margin-bottom:16px;line-height:1.5}
.error.show{display:block}
button{width:100%;background:var(--gold);color:var(--navy-dark);border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:900;font-family:inherit;cursor:pointer;transition:.2s}
button:hover{background:var(--gold-light);transform:translateY(-1px)}
button:disabled{opacity:.65;cursor:not-allowed;transform:none}
.actions{display:flex;justify-content:center;gap:12px;margin-top:18px;font-size:13px;color:var(--g400)}
.actions a{color:var(--navy);font-weight:800;text-decoration:none}
.note{text-align:center;color:var(--g400);font-size:12px;line-height:1.6;margin-top:18px}
@media(max-width:480px){.card{padding:34px 24px}h1{font-size:26px}}
</style>
</head>
<body>
<div class="card">
  <a class="logo" href="index.html">
    <div class="logo-icon">
      <div class="logo-bar" style="height:10px;opacity:.45"></div>
      <div class="logo-bar" style="height:16px;opacity:.7"></div>
      <div class="logo-bar" style="height:22px"></div>
      <div class="logo-bar g" style="height:17px"></div>
    </div>
    <div class="logo-text">Drop<span>Research</span> Hub</div>
  </a>

  <div class="admin-badge">Admin access</div>
  <h1>Admin Login</h1>
  <p class="sub">Sign in with your admin account to manage products, customers and Market Pulse.</p>

  <div id="error" class="error">Login failed. Check your details and try again.</div>

  <form id="adminLoginForm">
    <label for="email">Email address</label>
    <input id="email" type="email" autocomplete="email" placeholder="Enter your admin email" required>

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="Your password" required>

    <button id="loginBtn" type="submit">Open Admin Panel</button>
  </form>

  <div class="actions">
    <a href="forgot-password.html">Forgot password?</a>
    <span>•</span>
    <a href="index.html">Back to site</a>
  </div>

  <div class="note">Only accounts with the admin role can access this area.</div>
</div>

<script>
const existingSession = JSON.parse(sessionStorage.getItem('drh_session') || 'null');
if (existingSession && existingSession.role === 'admin') {
  window.location.href = 'admin.html';
}

const form = document.getElementById('adminLoginForm');
const errorBox = document.getElementById('error');
const btn = document.getElementById('loginBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  errorBox.classList.remove('show');

  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    errorBox.textContent = 'Enter your email and password.';
    errorBox.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Checking...';

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', email, password })
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      throw new Error(data.error || 'Login failed.');
    }

    if (data.role !== 'admin') {
      throw new Error('This account is not authorised for admin access.');
    }

    sessionStorage.setItem('drh_auth', 'member');
    sessionStorage.setItem('drh_session', JSON.stringify({
      email: data.email || email,
      name: data.name || 'Admin',
      role: data.role || 'admin',
      subscription_status: data.subscription_status || 'active',
      admin_token: data.admin_token || null
    }));

    window.location.href = 'admin.html';
  } catch (err) {
    errorBox.textContent = err.message || 'Login failed. Check your details and try again.';
    errorBox.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Open Admin Panel';
  }
});
</script>
</body>
</html>
