<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — DropResearch Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a1628 0%,#142840 60%,#1a3558 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:48px;max-width:400px;width:100%;box-shadow:0 32px 80px rgba(0,0,0,.4)}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px}
.logo-icon{width:44px;height:44px;background:#1E3A5F;border-radius:12px;display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:9px 8px}
.logo-bar{width:5px;border-radius:2px;background:rgba(255,255,255,.4)}
.logo-text{font-size:18px;font-weight:900;color:#1E3A5F}.logo-text span{color:#F59E0B}
h1{font-size:22px;font-weight:900;color:#111827;text-align:center;margin-bottom:6px}
p{font-size:13px;color:#6B7280;text-align:center;margin-bottom:28px}
.input{width:100%;border:1.5px solid #E5E7EB;border-radius:12px;padding:14px 16px;font-size:15px;font-family:inherit;color:#111827;outline:none;transition:border-color .15s;margin-bottom:14px}
.input:focus{border-color:#1E3A5F}
.error{background:#FEE2E2;color:#DC2626;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:14px;display:none}
.error.show{display:block}
.btn{width:100%;background:#F59E0B;color:#142840;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;transition:all .2s}
.btn:hover{background:#FCD34D}
.btn:disabled{opacity:.6;cursor:not-allowed}
.back{display:block;text-align:center;margin-top:18px;font-size:13px;color:#9CA3AF;text-decoration:none}
.back:hover{color:#1E3A5F}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <div class="logo-bar" style="height:10px"></div>
      <div class="logo-bar" style="height:16px"></div>
      <div class="logo-bar" style="height:22px;background:rgba(255,255,255,.9)"></div>
      <div class="logo-bar" style="height:17px;background:#F59E0B"></div>
    </div>
    <div class="logo-text">Drop<span>Research</span> Hub</div>
  </div>
  <h1>Admin Access</h1>
  <p>Sign in with your admin account to access the control panel.</p>
  <div class="error" id="error">Incorrect email or password. Please try again.</div>
  <input class="input" type="email" id="email" placeholder="Admin email" autocomplete="username"/>
  <input class="input" type="password" id="password" placeholder="Admin password" autocomplete="current-password"/>
  <button class="btn" id="btn" onclick="login()">Enter Admin Panel →</button>
  <a href="index.html" class="back">← Back to site</a>
</div>
<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('error');
  const btn = document.getElementById('btn');
  err.classList.remove('show');

  if (!email || !password) {
    err.textContent = 'Enter both email and password.';
    err.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Checking…';

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', email, password })
    });
    const data = await res.json();

    if (!res.ok || !data.success || data.role !== 'admin') {
      err.textContent = data.role && data.role !== 'admin'
        ? 'This account does not have admin access.'
        : 'Incorrect email or password. Please try again.';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Enter Admin Panel →';
      return;
    }

    // Real admin session, backed by the actual logged-in account
    sessionStorage.setItem('drh_session', JSON.stringify({
      userId: data.userId,
      email: data.email,
      name: data.name,
      role: 'admin'
    }));
    sessionStorage.setItem('drh_auth', 'member');

    window.location.href = data.redirect || 'admin.html';
  } catch (e) {
    err.textContent = 'Something went wrong. Please try again.';
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Enter Admin Panel →';
  }
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
