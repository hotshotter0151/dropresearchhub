<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — DropResearch Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1E3A5F;
  --navy-dark:#142840;
  --gold:#F59E0B;
  --gold-light:#FCD34D;
  --g50:#F9FAFB;
  --g100:#F3F4F6;
  --g200:#E5E7EB;
  --g300:#D1D5DB;
  --g400:#9CA3AF;
  --g500:#6B7280;
  --g700:#374151;
  --g900:#111827;
  --green:#16A34A;
  --red:#DC2626;
  --red-bg:#FEE2E2;
}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0a1628 0%,#142840 60%,#1a3558 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.card{
  background:#fff;
  border-radius:24px;
  padding:48px;
  max-width:420px;
  width:100%;
  box-shadow:0 32px 80px rgba(0,0,0,.3);
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  justify-content:center;
  margin-bottom:32px;
  text-decoration:none;
}
.logo-icon{
  width:44px;
  height:44px;
  background:var(--navy);
  border-radius:12px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:3px;
  padding:9px 8px;
}
.logo-bar{
  width:5px;
  border-radius:2px;
  background:rgba(255,255,255,.4);
}
.logo-bar.g{background:var(--gold)}
.logo-text{
  font-size:18px;
  font-weight:900;
  color:var(--navy);
  letter-spacing:-.3px;
}
.logo-text span{color:var(--gold)}
h1{
  font-size:24px;
  font-weight:900;
  color:var(--navy);
  text-align:center;
  margin-bottom:6px;
}
.sub{
  font-size:14px;
  color:var(--g500);
  text-align:center;
  margin-bottom:30px;
  line-height:1.6;
}
.form-group{margin-bottom:18px}
.form-label{
  display:block;
  font-size:13px;
  font-weight:700;
  color:var(--g700);
  margin-bottom:6px;
}
.form-input{
  width:100%;
  border:1.5px solid var(--g200);
  border-radius:12px;
  padding:13px 16px;
  font-size:15px;
  font-family:inherit;
  color:var(--g900);
  outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.form-input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 4px rgba(245,158,11,.14);
}
.error{
  background:var(--red-bg);
  color:var(--red);
  border-radius:12px;
  padding:12px 14px;
  font-size:13px;
  font-weight:800;
  margin-bottom:16px;
  display:none;
  line-height:1.5;
}
.error.show{display:block}
.submit{
  width:100%;
  background:var(--gold);
  color:var(--navy-dark);
  border:none;
  border-radius:14px;
  padding:15px;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  font-family:inherit;
  transition:all .2s;
  margin-top:8px;
}
.submit:hover{
  background:var(--gold-light);
  transform:translateY(-1px);
}
.submit:disabled{
  opacity:.6;
  cursor:not-allowed;
  transform:none;
}
.helper-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-top:-6px;
  margin-bottom:18px;
}
.helper-row a{
  font-size:13px;
  color:var(--navy);
  font-weight:800;
  text-decoration:none;
}
.helper-row a:hover{text-decoration:underline}
.divider{
  display:flex;
  align-items:center;
  gap:12px;
  margin:20px 0;
  color:var(--g300);
  font-size:12px;
}
.divider::before,.divider::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--g200);
}
.signup-link{
  display:block;
  text-align:center;
  font-size:14px;
  color:var(--navy);
  font-weight:800;
  text-decoration:none;
  background:var(--g50);
  border:1px solid var(--g200);
  border-radius:12px;
  padding:12px;
}
.signup-link:hover{background:var(--g100)}
.back{
  display:block;
  text-align:center;
  margin-top:20px;
  font-size:13px;
  color:var(--g400);
  text-decoration:none;
}
.back:hover{color:var(--navy)}
@media(max-width:480px){
  .card{padding:34px 24px}
}
</style>
</head>
<body>
<div class="card">
  <a class="logo" href="index.html">
    <div class="logo-icon">
      <div class="logo-bar" style="height:10px"></div>
      <div class="logo-bar" style="height:16px"></div>
      <div class="logo-bar" style="height:22px;background:rgba(255,255,255,.9)"></div>
      <div class="logo-bar g" style="height:17px"></div>
    </div>
    <div class="logo-text">Drop<span>Research</span> Hub</div>
  </a>

  <h1>Welcome back</h1>
  <p class="sub">Sign in to your DropResearch Hub account.</p>

  <div class="error" id="error"></div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input class="form-input" type="email" id="email" placeholder="Enter your account email" autocomplete="email" required/>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password" required/>
    </div>

    <div class="helper-row">
      <span></span>
      <a href="forgot-password.html">Forgot password?</a>
    </div>

    <button class="submit" id="submit-btn" type="submit">Sign in →</button>
  </form>

  <div class="divider">don't have an account?</div>

  <a href="signup.html" class="signup-link">Start your free 7-day trial →</a>
  <a href="index.html" class="back">← Back to homepage</a>
</div>

<script>
const loginForm = document.getElementById('loginForm');
const errorBox = document.getElementById('error');
const submitBtn = document.getElementById('submit-btn');

function showError(message) {
  errorBox.textContent = message || 'Something went wrong. Please try again.';
  errorBox.classList.add('show');
  submitBtn.disabled = false;
  submitBtn.textContent = 'Sign in →';
}

function clearError() {
  errorBox.textContent = '';
  errorBox.classList.remove('show');
}

function readExistingSession() {
  try {
    return JSON.parse(sessionStorage.getItem('drh_session') || 'null');
  } catch {
    return null;
  }
}

function redirectExistingSession() {
  const session = readExistingSession();

  if (!session) return;

  const role = String(session.role || '').toLowerCase();
  const status = String(session.status || session.subscription_status || '').toLowerCase();

  if (role === 'admin') {
    window.location.href = 'admin.html';
    return;
  }

  if (status === 'active') {
    window.location.href = 'members.html';
    return;
  }

  if (status === 'trial') {
    window.location.href = 'dashboard.html';
  }
}

async function readJsonSafely(response) {
  const text = await response.text();

  try {
    return JSON.parse(text);
  } catch {
    if (response.status === 404 || text.toLowerCase().includes('page could not be found')) {
      throw new Error('Login service is not available. Check /api/auth is deployed.');
    }

    throw new Error('Login service returned an invalid response. Check the Vercel function logs.');
  }
}

function saveSession(data, fallbackEmail) {
  const role = data.role || 'member';
  const subscriptionStatus = role === 'admin' ? 'active' : (data.subscription_status || data.status || 'trial');
  const status = subscriptionStatus;

  const session = {
    email: data.email || fallbackEmail,
    name: data.name || '',
    userId: data.userId || data.id || null,
    status,
    subscription_status: subscriptionStatus,
    role,
    trial_ends_at: data.trial_ends_at || null
  };

  sessionStorage.setItem('drh_session', JSON.stringify(session));
  sessionStorage.setItem('drh_auth', status === 'active' ? 'member' : 'trial');
  sessionStorage.setItem('drh_email', session.email);
  sessionStorage.setItem('drh_name', session.name);
}

function getRedirectTarget(data) {
  if (data.redirect) return data.redirect;

  const role = String(data.role || '').toLowerCase();
  const status = String(data.subscription_status || data.status || '').toLowerCase();

  if (role === 'admin') return 'admin.html';
  if (status === 'active') return 'members.html';
  if (status === 'trial') return 'dashboard.html';

  return 'dashboard.html';
}

async function handleLogin(event) {
  event.preventDefault();

  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;

  clearError();

  if (!email) {
    showError('Please enter your email.');
    return;
  }

  if (!password) {
    showError('Please enter your password.');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing in...';

  try {
    const response = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', email, password })
    });

    const data = await readJsonSafely(response);

    if (!response.ok || !data.success) {
      showError(data.error || 'Invalid email or password.');
      return;
    }

    if (data.subscription_status === 'cancelled') {
      showError('Your subscription has been cancelled. Please resubscribe to access the platform.');
      return;
    }

    saveSession(data, email);

    window.location.href = getRedirectTarget(data);
  } catch (error) {
    showError(error.message || 'Something went wrong. Please try again.');
  }
}

redirectExistingSession();
loginForm.addEventListener('submit', handleLogin);
</script>
</body>
</html>
