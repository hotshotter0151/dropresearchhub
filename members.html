<title>DropResearch Hub — Members</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const _session = JSON.parse(sessionStorage.getItem('drh_session') || 'null');
const _auth = sessionStorage.getItem('drh_auth');
if (_auth === 'member' && !_session?.email) {
} else if (!_auth && !_session?.email) {
  window.location.href = 'login.html';
} else if (_auth === 'trial') {
  window.location.href = 'trial.html';
}
async function verifyMemberAccess() {
  const session = JSON.parse(sessionStorage.getItem('drh_session') || 'null');
  if (!session?.email) return;
  if (session.role === 'admin') return;
  try {
    const res = await fetch('/api/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'checkStatus', email: session.email }) });
    const data = await res.json();
    if (!data.success) { sessionStorage.clear(); window.location.href = 'login.html'; return; }
    if (data.subscription_status !== 'active') { window.location.href = 'trial.html'; }
  } catch(e) {}
}
verifyMemberAccess();
</script>
