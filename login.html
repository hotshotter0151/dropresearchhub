<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — DropResearch Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1E3A5F;--navy-dark:#142840;--gold:#F59E0B;--gold-light:#FCD34D;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;--g400:#9CA3AF;--g500:#6B7280;--g700:#374151;--g900:#111827;--green:#16A34A;--red:#DC2626}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a1628 0%,#142840 60%,#1a3558 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:48px;max-width:420px;width:100%;box-shadow:0 32px 80px rgba(0,0,0,.3)}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px;text-decoration:none}
.logo-icon{width:44px;height:44px;background:var(--navy);border-radius:12px;display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:9px 8px}
.logo-bar{width:5px;border-radius:2px;background:rgba(255,255,255,.4)}.logo-bar.g{background:var(--gold)}
.logo-text{font-size:18px;font-weight:900;color:var(--navy);letter-spacing:-.3px}.logo-text span{color:var(--gold)}
h1{font-size:24px;font-weight:900;color:var(--navy);text-align:center;margin-bottom:6px}
.sub{font-size:14px;color:var(--g500);text-align:center;margin-bottom:32px}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:13px;font-weight:700;color:var(--g700);margin-bottom:6px}
.form-input{width:100%;border:1.5px solid var(--g200);border-radius:12px;padding:13px 16px;font-size:15px;font-family:inherit;color:var(--g900);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--navy)}
.error{background:#FEE2E2;color:var(--red);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:16px;display:none}
.error.show{display:block}
.submit{width:100%;background:var(--gold);color:var(--navy-dark);border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px}
.submit:hover{background:var(--gold-light)}
.submit:disabled{opacity:.6;cursor:not-allowed}
.back{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--g400);text-decoration:none}
.back:hover{color:var(--navy)}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--g300);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--g200)}
.signup-link{display:block;text-align:center;font-size:14px;color:var(--navy);font-weight:700;text-decoration:none;background:var(--g50);border:1px solid var(--g200);border-radius:12px;padding:12px}
.signup-link:hover{background:var(--g100)}
</style>
</head>
<body>
<div class="card">
  <a class="logo" href="index.html">
    <div class="logo-icon">
      <div class="logo-bar" style="height:10px"></div>
      <div class="logo-bar" style="height:16px"></div>
      <div class="logo-bar" style="height:22px;background:rgba(255,255,255,.9)"></div>
      <div class="logo-bar g" style="height:17px"></div>
    </div>
    <div class="logo-text">Drop<span>Research</span> Hub</div>
  </a>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to your account</p>
  <div class="error" id="error"></div>
  <div class="form-group">
    <label class="form-label">Email address</label>
    <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password"/>
  </div>
  <button class="submit" id="submit-btn" onclick="handleLogin()">Sign in →</button>
  <div class="divider">don't have an account?</div>
  <a href="signup.html" class="signup-link">Start your free 7-day trial →</a>
  <a href="index.html" class="back">← Back to homepage</a>
</div>
<script>
function showError(msg) {
  const error = document.getElementById('error');
  const btn = document.getElementById('submit-btn');
  error.textContent = msg;
  error.classList.add('show');
  btn.disabled = false;
  btn.textContent = 'Sign in →';
}

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const error = document.getElementById('error');
  const btn = document.getElementById('submit-btn');

  error.classList.remove('show');
  if (!email) { showError('Please enter your email.'); return; }
  if (!password) { showError('Please enter your password.'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', email, password })
    });
    const data = await res.json();

    if (!res.ok || !data.success) {
      showError(data.error || 'Invalid email or password.');
      return;
    }

    // Cancelled accounts: block with a resubscribe prompt
    if (data.subscription_status === 'cancelled') {
      showError('Your subscription has been cancelled. Please resubscribe to access the platform.');
      return;
    }

    // Store the session — drh_session JSON is what dashboard/members read
    const status = data.role === 'admin' ? 'active' : (data.subscription_status || 'trial');
    sessionStorage.setItem('drh_session', JSON.stringify({
      email: data.email,
      name: data.name,
      userId: data.userId,
      status: status,
      role: data.role || 'member',
      trial_ends_at: data.trial_ends_at || null
    }));
    sessionStorage.setItem('drh_auth', status === 'active' ? 'member' : 'trial');
    sessionStorage.setItem('drh_email', data.email);
    sessionStorage.setItem('drh_name', data.name || '');

    // Server decides where everyone goes:
    // admin -> admin.html, active -> members.html, trial -> dashboard.html
    window.location.href = data.redirect || 'dashboard.html';
  } catch (e) {
    showError('Something went wrong. Please try again.');
  }
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
