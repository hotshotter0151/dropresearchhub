<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DropResearch Hub — Find Emerging Products Before They Explode</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#1E3A5F;
  --navy-light:#2B4F82;
  --navy-dark:#142840;
  --gold:#F59E0B;
  --gold-light:#FCD34D;
  --gold-dark:#D97706;
  --white:#ffffff;
  --off-white:#F8FAFF;
  --gray-50:#F9FAFB;
  --gray-100:#F3F4F6;
  --gray-200:#E5E7EB;
  --gray-300:#D1D5DB;
  --gray-400:#9CA3AF;
  --gray-500:#6B7280;
  --gray-700:#374151;
  --gray-900:#111827;
  --green:#16A34A;
  --green-light:#DCFCE7;
}

html{scroll-behavior:smooth}

body{
  font-family:'Inter',sans-serif;
  background:#fff;
  color:var(--gray-900);
  line-height:1.6;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--gray-200);
  height:68px;
  display:flex;
  align-items:center;
  padding:0 5%;
}

.nav-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
  max-width:1200px;
  margin:0 auto;
}

.nav-logo{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  cursor:pointer;
}

.nav-logo-icon{
  width:38px;
  height:38px;
  border-radius:10px;
  background:var(--navy);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.nav-logo-bars{
  display:flex;
  align-items:flex-end;
  gap:2px;
  padding:8px 7px 6px;
}

.nav-logo-bar{
  border-radius:1.5px;
  background:#fff;
}

.nav-logo-bar.gold{background:var(--gold)}

.nav-logo-text{
  font-size:17px;
  font-weight:700;
  color:var(--navy);
  letter-spacing:-0.3px;
}

.nav-logo-text span{color:var(--gold)}

.nav-links{
  display:flex;
  align-items:center;
  gap:4px;
}

.nav-link,.nav-free{
  font-size:14px;
  font-weight:500;
  color:var(--gray-500);
  text-decoration:none;
  padding:8px 14px;
  border-radius:8px;
  transition:all 0.2s;
  position:relative;
  cursor:pointer;
}

.nav-free{
  color:var(--navy);
  font-weight:600;
}

.nav-link::after,.nav-free::after{
  content:'';
  position:absolute;
  bottom:4px;
  left:14px;
  right:14px;
  height:2px;
  background:var(--navy);
  border-radius:1px;
  transform:scaleX(0);
  transition:transform 0.2s;
}

.nav-free::after{background:var(--gold)}

.nav-link:hover,.nav-free:hover{color:var(--navy)}
.nav-link:hover::after,.nav-free:hover::after{transform:scaleX(1)}

.nav-free-badge{
  display:inline-block;
  background:var(--gold);
  color:var(--navy);
  font-size:9px;
  font-weight:700;
  padding:2px 5px;
  border-radius:4px;
  margin-left:5px;
  vertical-align:middle;
  letter-spacing:0.3px;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.btn-login{
  font-size:14px;
  font-weight:500;
  color:var(--gray-700);
  text-decoration:none;
  padding:8px 16px;
  border-radius:8px;
  border:1px solid var(--gray-200);
  transition:all 0.2s;
  cursor:pointer;
  background:#fff;
}

.btn-login:hover{
  border-color:var(--navy);
  color:var(--navy);
}

.btn-start{
  font-size:14px;
  font-weight:600;
  color:#fff;
  background:var(--navy);
  padding:9px 20px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  transition:all 0.2s;
  text-decoration:none;
}

.btn-start:hover{
  background:var(--navy-light);
  transform:translateY(-1px);
}

.hamburger{
  display:none;
  background:none;
  border:1px solid var(--gray-200);
  border-radius:8px;
  padding:8px;
  cursor:pointer;
  color:var(--gray-700);
}

/* MOBILE MENU */
.mobile-nav{
  display:none;
  position:fixed;
  top:68px;
  left:0;
  right:0;
  background:#fff;
  border-bottom:1px solid var(--gray-200);
  z-index:99;
  flex-direction:column;
  padding:12px 24px 20px;
}

.mobile-nav.open{display:flex}

.mobile-nav a{
  font-size:15px;
  font-weight:500;
  color:var(--gray-700);
  text-decoration:none;
  padding:12px 0;
  border-bottom:1px solid var(--gray-100);
}

/* PAGE */
.page{
  display:none;
  padding-top:68px;
}

.page.active{display:block}

/* HERO */
.hero{
  padding:80px 5% 60px;
  text-align:center;
  background:#fff;
  max-width:1200px;
  margin:0 auto;
}

.hero-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--off-white);
  border:1px solid var(--gray-200);
  border-radius:20px;
  padding:6px 16px;
  font-size:13px;
  font-weight:500;
  color:var(--navy);
  margin-bottom:28px;
}

.hero-badge-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--green);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:0.4}
}

.hero h1{
  font-size:clamp(2.4rem,5vw,4rem);
  font-weight:800;
  line-height:1.1;
  color:var(--gray-900);
  margin-bottom:20px;
  letter-spacing:-1.5px;
}

.hero h1 em{
  font-style:normal;
  color:var(--navy);
}

.hero h1 span{color:var(--gold)}

.hero-sub{
  font-size:1.1rem;
  color:var(--gray-500);
  max-width:630px;
  margin:0 auto 36px;
  font-weight:400;
  line-height:1.7;
}

.hero-ctas{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.btn-primary{
  background:var(--navy);
  color:#fff;
  font-size:15px;
  font-weight:600;
  padding:14px 28px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  transition:all 0.2s;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:8px;
}

.btn-primary:hover{
  background:var(--navy-light);
  transform:translateY(-2px);
}

.btn-secondary{
  background:#fff;
  color:var(--navy);
  font-size:15px;
  font-weight:600;
  padding:13px 28px;
  border-radius:10px;
  border:2px solid var(--navy);
  cursor:pointer;
  transition:all 0.2s;
  text-decoration:none;
}

.btn-secondary:hover{background:var(--off-white)}

.hero-note{
  font-size:13px;
  color:var(--gray-400);
  margin-bottom:50px;
}

.hero-trust{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
}

.hero-stars{
  display:flex;
  gap:2px;
  color:var(--gold);
  font-size:18px;
}

.hero-trust-text{
  font-size:14px;
  color:var(--gray-500);
}

.hero-trust-text strong{color:var(--gray-900)}

.hero-avatars{display:flex}

.hero-avatar{
  width:30px;
  height:30px;
  border-radius:50%;
  border:2px solid #fff;
  margin-left:-8px;
  font-size:11px;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero-avatar:first-child{margin-left:0}

/* DASHBOARD MOCKUP */
.hero-mockup{
  max-width:1100px;
  margin:50px auto 0;
  background:#fff;
  border:1px solid var(--gray-200);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 4px 40px rgba(30,58,95,0.08);
}

.mockup-bar{
  background:var(--gray-50);
  border-bottom:1px solid var(--gray-200);
  padding:12px 20px;
  display:flex;
  align-items:center;
  gap:8px;
}

.mockup-dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.mockup-url{
  flex:1;
  background:#fff;
  border:1px solid var(--gray-200);
  border-radius:6px;
  padding:5px 12px;
  font-size:12px;
  color:var(--gray-400);
  margin:0 12px;
}

.mockup-tabs{
  background:var(--navy);
  padding:0 20px;
  display:flex;
  gap:2px;
}

.mockup-tab{
  padding:12px 14px;
  font-size:12px;
  font-weight:500;
  color:rgba(255,255,255,0.5);
  cursor:pointer;
  border-bottom:2px solid transparent;
}

.mockup-tab.active{
  color:#fff;
  border-bottom-color:var(--gold);
}

.mockup-body{
  padding:20px;
  background:var(--gray-50);
}

.mockup-stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:16px;
}

.mockup-stat{
  background:#fff;
  border:1px solid var(--gray-200);
  border-radius:10px;
  padding:14px;
}

.mockup-stat-label{
  font-size:10px;
  color:var(--gray-400);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:4px;
}

.mockup-stat-val{
  font-size:20px;
  font-weight:700;
  color:var(--gray-900);
}

.mockup-stat-sub{
  font-size:10px;
  color:var(--gray-400);
  margin-top:2px;
}

.mockup-products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.mockup-card{
  background:#fff;
  border:1px solid var(--gray-200);
  border-radius:10px;
  overflow:hidden;
}

.mockup-card-img{
  height:100px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  position:relative;
}

.mockup-grade{
  position:absolute;
  top:8px;
  left:8px;
  min-width:28px;
  height:22px;
  border-radius:20px;
  font-size:10px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  padding:0 7px;
}

.mockup-trend{
  position:absolute;
  top:8px;
  right:8px;
  background:rgba(255,255,255,0.9);
  border-radius:6px;
  padding:3px 7px;
  font-size:10px;
  font-weight:600;
}

.mockup-card-body{padding:10px}

.mockup-card-name{
  font-size:12px;
  font-weight:600;
  color:var(--gray-900);
  margin-bottom:2px;
}

.mockup-card-niche{
  font-size:10px;
  color:var(--gray-400);
  margin-bottom:8px;
}

.mockup-card-metrics{
  display:flex;
  gap:8px;
}

.mockup-card-met{flex:1}

.mockup-card-met-label{
  font-size:9px;
  color:var(--gray-400);
  text-transform:uppercase;
}

.mockup-card-met-val{
  font-size:12px;
  font-weight:600;
  color:var(--gray-900);
}

.mockup-bar-fill{
  height:3px;
  border-radius:2px;
  background:var(--gray-100);
  margin-top:6px;
  overflow:hidden;
}

.mockup-bar-inner{
  height:100%;
  border-radius:2px;
}

/* STATS BAR */
.stats-bar{
  background:var(--navy);
  padding:28px 5%;
}

.stats-bar-inner{
  max-width:1200px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  text-align:center;
}

.stats-item-val{
  font-size:2rem;
  font-weight:800;
  color:#fff;
  margin-bottom:4px;
  letter-spacing:-1px;
}

.stats-item-val span{color:var(--gold)}

.stats-item-label{
  font-size:12px;
  color:rgba(255,255,255,0.6);
  text-transform:uppercase;
  letter-spacing:1px;
}

/* FEATURES */
.features{
  padding:80px 5%;
}

.features-inner{
  max-width:1200px;
  margin:0 auto;
}

.section-eyebrow{
  font-size:13px;
  font-weight:600;
  color:var(--navy);
  text-transform:uppercase;
  letter-spacing:2px;
  margin-bottom:12px;
}

.section-h2{
  font-size:clamp(1.8rem,3vw,2.6rem);
  font-weight:800;
  color:var(--gray-900);
  letter-spacing:-0.5px;
  line-height:1.2;
  margin-bottom:16px;
}

.section-sub{
  font-size:1rem;
  color:var(--gray-500);
  line-height:1.7;
  max-width:480px;
}

.feature-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
  align-items:center;
  margin-bottom:80px;
}

.feature-row.reverse{direction:rtl}
.feature-row.reverse > *{direction:ltr}

.feature-points{
  display:flex;
  flex-direction:column;
  gap:16px;
  margin-top:24px;
}

.feature-point{
  display:flex;
  gap:12px;
  align-items:flex-start;
}

.feature-point-icon{
  width:34px;
  height:34px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  flex-shrink:0;
  margin-top:1px;
}

.feature-point-title{
  font-size:14px;
  font-weight:600;
  color:var(--gray-900);
  margin-bottom:2px;
}

.feature-point-desc{
  font-size:13px;
  color:var(--gray-500);
  line-height:1.6;
}

.feature-visual{
  background:var(--off-white);
  border:1px solid var(--gray-200);
  border-radius:16px;
  overflow:hidden;
}

/* PRODUCT FEED VISUAL */
.feed-visual{padding:16px}

.feed-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}

.feed-title{
  font-size:13px;
  font-weight:600;
  color:var(--gray-900);
}

.feed-badge{
  background:var(--green-light);
  color:var(--green);
  font-size:11px;
  font-weight:600;
  padding:3px 10px;
  border-radius:20px;
}

.feed-cards{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.feed-card{
  background:#fff;
  border:1px solid var(--gray-200);
  border-radius:10px;
  padding:12px;
  display:flex;
  align-items:center;
  gap:12px;
}

.feed-emoji{
  font-size:24px;
  width:40px;
  text-align:center;
}

.feed-info{flex:1}

.feed-name{
  font-size:13px;
  font-weight:600;
  color:var(--gray-900);
}

.feed-meta{
  font-size:11px;
  color:var(--gray-400);
}

.feed-right{text-align:right}

.feed-margin{
  font-size:14px;
  font-weight:700;
  color:var(--navy);
}

.feed-grade{
  display:inline-block;
  min-width:28px;
  height:22px;
  border-radius:20px;
  font-size:10px;
  font-weight:700;
  color:#fff;
  text-align:center;
  line-height:22px;
  margin-top:3px;
  padding:0 7px;
}

/* CREATIVE VISUAL */
.creative-visual{padding:16px}

.creative-tabs{
  display:flex;
  gap:6px;
  margin-bottom:12px;
}

.creative-tab{
  font-size:11px;
  font-weight:500;
  padding:5px 12px;
  border-radius:20px;
  cursor:pointer;
  border:1px solid var(--gray-200);
  color:var(--gray-500);
}

.creative-tab.active{
  background:var(--navy);
  color:#fff;
  border-color:var(--navy);
}

.creative-var{
  background:#fff;
  border:1px solid var(--gray-200);
  border-radius:10px;
  padding:14px;
  margin-bottom:8px;
}

.creative-var-label{
  font-size:10px;
  font-weight:600;
  color:var(--navy);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:6px;
}

.creative-script{
  font-size:12px;
  color:var(--gray-700);
  line-height:1.6;
  font-style:italic;
}

.creative-meta{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}

.creative-meta-item{
  background:var(--gray-50);
  border-radius:8px;
  padding:8px 10px;
}

.creative-meta-label{
  font-size:9px;
  color:var(--gray-400);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:2px;
}

.creative-meta-val{
  font-size:11px;
  font-weight:500;
  color:var(--gray-700);
}

/* CALC VISUAL */
.calc-visual{padding:16px}

.calc-inputs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:12px;
}

.calc-input-item{
  background:#fff;
  border:1px solid var(--gray-200);
  border-radius:8px;
  padding:10px 12px;
}

.calc-input-label{
  font-size:10px;
  color:var(--gray-400);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:2px;
}

.calc-input-val{
  font-size:14px;
  font-weight:600;
  color:var(--gray-900);
}

.calc-result-box{
  background:var(--navy);
  border-radius:10px;
  padding:14px;
}

.calc-result-row{
  display:flex;
  justify-content:space-between;
  padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
  font-size:12px;
}

.calc-result-row:last-child{border-bottom:none}

.calc-result-label{color:rgba(255,255,255,0.6)}
.calc-result-val{color:#fff;font-weight:600}
.calc-result-val.gold{color:var(--gold)}
.calc-result-val.green{color:#4ADE80}

/* TESTIMONIALS */
.testimonials{
  padding:80px 5%;
  background:var(--gray-50);
}

.testimonials-inner{
  max-width:1200px;
  margin:0 auto;
}

.testimonials-header{
  text-align:center;
  margin-bottom:48px;
}

.testimonials-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.testimonial{
  background:#fff;
  border:1px solid var(--gray-200);
  border-radius:16px;
  padding:24px;
}

.testimonial-stars{
  color:var(--gold);
  font-size:16px;
  margin-bottom:14px;
  letter-spacing:2px;
}

.testimonial-text{
  font-size:14px;
  color:var(--gray-700);
  line-height:1.7;
  margin-bottom:20px;
  font-style:italic;
}

.testimonial-author{
  display:flex;
  align-items:center;
  gap:12px;
}

.testimonial-avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:700;
  color:#fff;
  flex-shrink:0;
}

.testimonial-name{
  font-size:14px;
  font-weight:600;
  color:var(--gray-900);
}

.testimonial-role{
  font-size:12px;
  color:var(--gray-400);
}

.testimonial-result{
  display:inline-block;
  background:var(--green-light);
  color:var(--green);
  font-size:11px;
  font-weight:600;
  padding:3px 10px;
  border-radius:20px;
  margin-top:6px;
}

/* PRICING */
.pricing{
  padding:80px 5%;
  background:#fff;
}

.pricing-inner{
  max-width:600px;
  margin:0 auto;
  text-align:center;
}

.pricing-header{margin-bottom:40px}

.pricing-card{
  background:#fff;
  border:2px solid var(--navy);
  border-radius:20px;
  padding:40px;
  position:relative;
  overflow:hidden;
}

.pricing-card::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:4px;
  background:linear-gradient(90deg,var(--navy),var(--gold));
}

.pricing-tag{
  background:var(--gold);
  color:var(--navy);
  font-size:12px;
  font-weight:700;
  padding:4px 14px;
  border-radius:20px;
  display:inline-block;
  margin-bottom:20px;
  letter-spacing:0.5px;
}

.pricing-amount{
  font-size:4rem;
  font-weight:800;
  color:var(--gray-900);
  letter-spacing:-2px;
  line-height:1;
}

.pricing-amount sup{

.pricing-check{

.pricing-cta:hover{

.pricing-note{

  padding:80px 5%;

.faq-icon{

.faq-answer{
