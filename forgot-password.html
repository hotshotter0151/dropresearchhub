<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password — DropResearch Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1E3A5F;--navy-light:#2B4F82;--navy-dark:#142840;
  --gold:#F59E0B;--gold-light:#FCD34D;
  --white:#fff;--off:#F8FAFF;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;
  --g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g700:#374151;--g900:#111827;
  --green:#16A34A;--green-bg:#DCFCE7;
  --red:#DC2626;--red-bg:#FEE2E2;
}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a1628 0%,#142840 58%,#1E3A5F 100%);min-height:100vh;color:var(--g900);display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:440px}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;margin-bottom:22px;color:#fff}
.logo-icon{width:38px;height:38px;background:#fff;border-radius:10px;display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:7px 6px}
.logo-bar{width:5px;border-radius:2px;background:var(--navy)}
.logo-bar.g{background:var(--gold)}
.logo-text{font-size:20px;font-weight:900;letter-spacing:-.5px;color:#fff}
.logo-text span{color:var(--gold)}
.card{background:#fff;border-radius:26px;padding:38px;box-shadow:0 28px 80px rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.2)}
.badge{display:inline-flex;align-items:center;gap:8px;background:var(--off);color:var(--navy);border:1px solid var(--g200);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900;margin-bottom:18px}
h1{font-size:30px;line-height:1.12;font-weight:900;letter-spacing:-1px;color:var(--navy-dark);margin-bottom:10px}
p{font-size:14px;line-height:1.7;color:var(--g500);margin-bottom:24px}
label{display:block;font-size:13px;font-weight:800;color:var(--g700);margin-bottom:8px}
input{width:100%;border:1.5px solid var(--g200);border-radius:14px;padding:15px 16px;font-size:15px;font-family:inherit;outline:none;transition:.15s;background:#fff}
input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(245,158,11,.14)}
button{width:100%;border:none;background:var(--gold);color:var(--navy-dark);border-radius:14px;padding:16px;font-size:15px;font-weight:900;font-family:inherit;cursor:pointer;transition:.2s;margin-top:16px}
button:hover{background:var(--gold-light);transform:translateY(-1px)}
button:disabled{opacity:.65;cursor:not-allowed;transform:none}
.msg{display:none;border-radius:14px;padding:13px 14px;font-size:13px;font-weight:800;line-height:1.5;margin-bottom:16px}
.msg.show{display:block}
.msg.error{background:var(--red-bg);color:var(--red)}
.msg.success{background:var(--green-bg);color:var(--green)}
.small{font-size:12px;color:var(--g400);text-align:center;margin-top:16px;line-height:1.6}
.links{display:flex;gap:12px;align-items:center;justify-content:center;margin-top:22px;font-size:13px;color:var(--g400)}
.links a{color:var(--navy);font-weight:800;text-decoration:none}
@media(max-width:480px){.card{padding:30px 22px}h1{font-size:26px}}
</style>
</head>
<body>
<div class="wrap">
  <a class="logo" href="index.html">
    <div class="logo-icon">
      <div class="logo-bar" style="height:10px;opacity:.45"></div>
      <div class="logo-bar" style="height:16px;opacity:.7"></div>
      <div class="logo-bar" style="height:22px"></div>
      <div class="logo-bar g" style="height:17px"></div>
    </div>
    <div class="logo-text">Drop<span>Research</span> Hub</div>
  </a>

  <div class="card">
    <div class="badge">🔐 Password recovery</div>
    <h1>Reset your password</h1>
    <p>Enter the email used for your DropResearch Hub account. If the email exists, we’ll send a secure reset link.</p>

    <div id="msg" class="msg"></div>

    <form id="forgotForm">
      <label for="email">Email address</label>
      <input id="email" name="email" type="email" autocomplete="email" placeholder="Enter your account email" required>
      <button id="submitBtn" type="submit">Send reset link</button>
    </form>

    <div class="small">The reset link expires after 30 minutes and can only be used once.</div>

    <div class="links">
      <a href="login.html">Member login</a>
      <span>•</span>
      <a href="signup.html">Start free trial</a>
    </div>
  </div>
</div>

<script>
const form = document.getElementById('forgotForm');
const msg = document.getElementById('msg');
const btn = document.getElementById('submitBtn');

function showMessage(type, text) {
  msg.className = 'msg show ' + type;
  msg.textContent = text;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value.trim();

  if (!email) {
    showMessage('error', 'Enter your email address.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';
  msg.className = 'msg';

  try {
    const res = await fetch('/api/password-reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'requestReset', email })
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      throw new Error(data.error || 'Could not send reset link.');
    }

    showMessage('success', data.message || 'If that email is registered, a password reset link has been sent.');
    form.reset();
  } catch (err) {
    showMessage('error', err.message || 'Something went wrong. Try again.');
  }

  btn.disabled = false;
  btn.textContent = 'Send reset link';
});
</script>
</body>
</html>
